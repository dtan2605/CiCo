services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cico-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Cico@2024
      - MSSQL_PID=Express
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Cico@2024" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: cico.API/Dockerfile
    container_name: cico-api
    ports:
      - "5009:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CICO;User Id=sa;Password=Cico@2024;TrustServerCertificate=True;MultipleActiveResultSets=true
      - DeviceSettings__Mode=Mock
      - JwtSettings__Issuer=cico-api
      - JwtSettings__Audience=cico-client
      - JwtSettings__Secret=${JWT_SECRET:-M1ujHk9pL2sR4tW7vXyZ3aB6cD8eF0gNiK5oQ}
      - JwtSettings__ExpiryInMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: cico-web
      dockerfile: Dockerfile
    container_name: cico-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5009/api
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api
    restart: unless-stopped
